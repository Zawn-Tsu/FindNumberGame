<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Game Tìm Số</title>
  <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body>
  <!-- Login Modal -->
  <div id="loginModal" class="modal active">
    <div class="modal-content">
      <h2>Game Tìm Số</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="playerName">Tên của bạn</label>
          <input type="text" id="playerName" placeholder="Nhập tên" required maxlength="20">
        </div>
        <div class="form-group">
          <label for="roomCode">Mã phòng</label>
          <input type="text" id="roomCode" placeholder="Nhập mã phòng hoặc để trống để tạo mới" maxlength="10">
        </div>
        <button type="submit" class="btn-primary">Vào chơi</button>
      </form>
    </div>
  </div>

  <div class="container" id="gameContainer" style="display: none;">
    <div class="room-info">
      <span>Phòng: <strong id="roomCodeDisplay">-</strong></span>
    </div>

    <div class="header">
      <div class="player-card player-left">
        <div class="player-name" id="playerLeftName">-</div>
        <div class="player-score" id="playerLeftScore">0</div>
      </div>

      <div class="info-card current-number">
        <div class="label">Số tiếp</div>
        <div class="value" id="currentNumber">1</div>
      </div>

      <div class="player-card player-right">
        <div class="player-name" id="playerRightName">-</div>
        <div class="player-score" id="playerRightScore">0</div>
      </div>
    </div>

    <div class="game-board-container">
      <div id="board" class="board"></div>
    </div>

    <div class="footer">
      <button id="resetBtn" class="btn-rest">↻ Chơi lại</button>
      <button id="exitBtn" class="btn-exit">← Thoát</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
